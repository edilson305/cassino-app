<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta Cassino</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #0b1a0b, #000);
    color: white;
    text-align: center;
}

header {
    background: #111;
    padding: 15px;
    font-size: 22px;
    color: #00ff88;
}

.roleta {
    width: 250px;
    height: 250px;
    border-radius: 50%;
    margin: 20px auto;
    border: 5px solid #00ff88;
    background: conic-gradient(
        red 0deg 90deg,
        black 90deg 180deg,
        red 180deg 270deg,
        black 270deg 360deg
    );
    transition: transform 3s ease-out;
}

button {
    padding: 12px 20px;
    font-size: 16px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.vermelho { background: red; color: white; }
.preto { background: black; color: white; border: 1px solid white; }
.girar { background: #00ff88; }

</style>
</head>

<body>

<header>🎰 Roleta Cassino</header>

<p>Saldo: R$ <span id="saldo">100</span></p>

<h3>Escolha sua aposta:</h3>
<button class="vermelho" onclick="apostar('vermelho')">🔴 Vermelho</button>
<button class="preto" onclick="apostar('preto')">⚫ Preto</button>

<div id="roleta" class="roleta"></div>

<button class="girar" onclick="girar()">🎡 Girar</button>

<p id="status"></p>

<script>
let saldo = 100;
let aposta = null;
let girando = false;

function apostar(cor) {
    aposta = cor;
    document.getElementById("status").innerText = "Apostou em: " + cor;
}

function girar() {
    if (!aposta) {
        alert("Escolha uma aposta!");
        return;
    }

    if (girando) return;

    girando = true;

    let roleta = document.getElementById("roleta");
    let graus = 3600 + Math.floor(Math.random() * 360);
    roleta.style.transform = "rotate(" + graus + "deg)";

    setTimeout(() => {
        let resultado = graus % 360;
        let corResultado = (resultado < 90 || resultado > 270) ? "vermelho" : "preto";

        if (corResultado === aposta) {
            saldo += 50;
            document.getElementById("status").innerText = "🎉 Você ganhou!";
        } else {
            saldo -= 30;
            document.getElementById("status").innerText = "😢 Você perdeu!";
        }

        document.getElementById("saldo").innerText = saldo;

        aposta = null;
        girando = false;
    }, 3000);
}
</script>

</body>
</html>
