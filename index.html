<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caça-Níquel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #0b1a0b, #000);
    color: white;
    text-align: center;
}

header {
    background: #111;
    padding: 15px;
    font-size: 22px;
    color: #00ff88;
}

.slot {
    display: flex;
    justify-content: center;
    margin: 30px;
}

.reel {
    width: 80px;
    height: 80px;
    margin: 5px;
    font-size: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
    border-radius: 10px;
    box-shadow: 0 0 10px #00ff88;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #00ff88;
    cursor: pointer;
}

</style>
</head>

<body>

<header>🎰 Caça-Níquel</header>

<p>Saldo: R$ <span id="saldo">100</span></p>

<div class="slot">
    <div class="reel" id="r1">🍒</div>
    <div class="reel" id="r2">🍋</div>
    <div class="reel" id="r3">⭐</div>
</div>

<button onclick="girar()">🎮 Girar</button>

<p id="resultado"></p>

<script>
let saldo = 100;
let simbolos = ["🍒","🍋","⭐","💎","7️⃣"];

function girar() {
    if (saldo <= 0) {
        alert("Sem saldo!");
        return;
    }

    saldo -= 10;

    let r1 = document.getElementById("r1");
    let r2 = document.getElementById("r2");
    let r3 = document.getElementById("r3");

    let spins = 20;

    let interval = setInterval(() => {
        r1.innerText = simbolos[Math.floor(Math.random() * simbolos.length)];
        r2.innerText = simbolos[Math.floor(Math.random() * simbolos.length)];
        r3.innerText = simbolos[Math.floor(Math.random() * simbolos.length)];
        spins--;
        
        if (spins <= 0) {
            clearInterval(interval);

            if (r1.innerText === r2.innerText && r2.innerText === r3.innerText) {
                saldo += 100;
                document.getElementById("resultado").innerText = "🎉 JACKPOT!";
            } else {
                document.getElementById("resultado").innerText = "😢 Tente novamente";
            }

            document.getElementById("saldo").innerText = saldo;
        }

    }, 100);
}
</script>

</body>
</html>
