<!DOCTYPE html>
<html>
<head>
    <title>Cassino Online</title>
</head>

<body style="background:#0b1a0b; color:#00ff88; text-align:center; font-family:Arial;">

    <h1>🎰 Cassino Online</h1>

    <p>Saldo: R$ <span id="saldo">100</span></p>

    <button onclick="jogar()" style="padding:15px; font-size:18px;">
        🎮 Jogar
    </button>

    <p id="resultado"></p>

    <script>
        let saldo = 100;

        function jogar() {
            let ganho = Math.floor(Math.random() * 50);

            saldo += ganho;

            document.getElementById("saldo").innerText = saldo;
            document.getElementById("resultado").innerText = 
                "Você ganhou R$ " + ganho;
        }
    </script>

</body>
</html>
