<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassino App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1a0b;
    color: white;
}

header {
    background: #111;
    padding: 15px;
    text-align: center;
    color: #00ff88;
    font-size: 22px;
}

.saldo {
    text-align: center;
    padding: 10px;
    font-size: 18px;
}

.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

.card {
    background: #111;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 0 10px #00ff88;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
}

footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    display: flex;
    justify-content: space-around;
    padding: 10px;
}

</style>
</head>

<body>

<header>🎰 Cassino Online</header>

<div class="saldo">
    💰 Saldo: R$ <span id="saldo">100</span>
</div>

<div class="container">

    <div class="card" onclick="abrirJogo('roleta')">
        🎡 <br> Roleta
    </div>

    <div class="card" onclick="abrirJogo('slot')">
        🎰 <br> Caça-Níquel
    </div>

    <div class="card">
        🎲 <br> Dados (em breve)
    </div>

    <div class="card">
        🃏 <br> Cartas (em breve)
    </div>

</div>

<footer>
    <div>🏠</div>
    <div>🎮</div>
    <div>💰</div>
</footer>

<script>
function abrirJogo(jogo) {
    if (jogo === "roleta") {
        window.location.href = "roleta.html";
    }
    if (jogo === "slot") {
        window.location.href = "slot.html";
    }
}
</script>

</body>
</html>
