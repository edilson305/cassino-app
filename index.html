<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Spin</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#0B0B0B, #1a1a1a);
  color: #FFD700;
  text-align: center;
  font-family: Arial, sans-serif;
}

h1 {
  margin-top: 20px;
}

#saldo {
  font-size: 20px;
  margin: 10px;
}

#slot {
  font-size: 60px;
  margin: 30px;
}

button {
  padding: 15px;
  font-size: 18px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: #FFD700;
  color: black;
  font-weight: bold;
}

button:hover {
  background: #ffcc00;
}

#msg {
  margin: 20px;
  font-size: 18px;
}

.win {
  animation: brilho 0.4s infinite alternate;
}

@keyframes brilho {
  from { text-shadow: 0 0 10px gold; }
  to { text-shadow: 0 0 30px yellow; }
}

#loja {
  display: none;
  background: #222;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🎰 Golden Spin</h1>

<div id="saldo">Saldo: 100</div>

<div id="slot">🍒 🍋 🍊</div>

<button onclick="girar()">🎰 GIRAR</button>
<br>
<button onclick="abrirLoja()">💰 Comprar moedas</button>

<p id="msg"></p>

<!-- LOJA -->
<div id="loja">
  <h2>Comprar moedas</h2>

  <button onclick="comprar(50)">50 moedas - R$5</button><br><br>
  <button onclick="comprar(100)">100 moedas - R$9</button><br><br>
  <button onclick="comprar(500)">500 moedas - R$20</button><br><br>

  <button onclick="fecharLoja()">Fechar</button>
</div>

<!-- SONS -->
<audio id="spinSound" src="https://actions.google.com/sounds/v1/casino/slot_machine.ogg"></audio>
<audio id="winSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<script>
let saldo = localStorage.getItem("saldo") || 100;
saldo = parseInt(saldo);

let aposta = 10;

let itens = ["🍒","🍋","🍊","💎","7️⃣"];

function atualizar() {
  document.getElementById("saldo").innerText = "Saldo: " + saldo;
}

function salvar() {
  localStorage.setItem("saldo", saldo);
}

function msg(t) {
  document.getElementById("msg").innerText = t;
}

function girar() {
  if (saldo < aposta) {
    msg("Sem saldo!");
    return;
  }

  document.getElementById("spinSound").play();

  saldo -= aposta;
  salvar();
  atualizar();

  let slot = document.getElementById("slot");

  let intervalo = setInterval(() => {
    let a = itens[Math.floor(Math.random() * itens.length)];
    let b = itens[Math.floor(Math.random() * itens.length)];
    let c = itens[Math.floor(Math.random() * itens.length)];
    slot.innerText = `${a} ${b} ${c}`;
  }, 100);

  setTimeout(() => {
    clearInterval(intervalo);

    let a = itens[Math.floor(Math.random() * itens.length)];
    let b = itens[Math.floor(Math.random() * itens.length)];
    let c = itens[Math.floor(Math.random() * itens.length)];

    slot.innerText = `${a} ${b} ${c}`;

    if (a === b && b === c) {
      let premio = aposta * 5;
      saldo += premio;

      document.getElementById("winSound").play();

      slot.classList.add("win");
      msg("🎉 JACKPOT +" + premio);
    } else {
      msg("😢 Tente novamente");
    }

    setTimeout(() => slot.classList.remove("win"), 1000);

    salvar();
    atualizar();
  }, 2000);
}

function abrirLoja() {
  document.getElementById("loja").style.display = "block";
}

function fecharLoja() {
  document.getElementById("loja").style.display = "none";
}

function comprar(qtd) {
  saldo += qtd;
  salvar();
  atualizar();
  msg("Compra realizada! +" + qtd);
}

atualizar();
</script>

</body>
</html>
